<!DOCTYPE html>
<html>
<head>
    <title>Credit Card Fraud Detection</title>
    <style>
        body {font-family: Arial; background:#eef2ff; text-align:center;}
        .container {background:white;width:70%;margin:auto;padding:20px;border-radius:10px;box-shadow:0px 0px 10px #ccc;}
        .grid {display:grid;grid-template-columns:repeat(4,130px);gap:8px;justify-content:center;margin:20px;}
        input{padding:6px;width:120px;}
        button{padding:10px 20px;background:#3949ab;color:white;border:none;margin:5px;}
        button:hover{background:#1a237e;}
        .result{margin-top:20px;font-size:20px;font-weight:bold;}
    </style>
</head>

<body>
<div class="container">

<h1>💳 Credit Card Fraud Detection System</h1>
<p>Enter transaction details below</p>

<form action="/predict" method="post">

<div class="grid">
{% for i in range(1,29) %}
<input type="text" name="V{{i}}" placeholder="V{{i}}"
value="{{ form_data['V' ~ i] if form_data else '' }}" required>
{% endfor %}

<input type="text" name="Amount" placeholder="Amount"
value="{{ form_data['Amount'] if form_data else '' }}" required>
</div>

<label><b>Select Model:</b></label><br>
<select name="model">
    <option value="logistic">Logistic Regression</option>
    <option value="rf">Random Forest</option>
    <option value="xgb">XGBoost</option>
</select>


<br><br>

<button type="button" onclick="loadLegit()">Load Legit Example</button>
<button type="button" onclick="loadFraud()">Load Fraud Example</button>

<br><br>

<button type="submit">Predict Transaction</button>
</form>

<div class="result">{{ prediction }}</div>

</div>

<script>
function loadLegit(){
let values=[-1.359807,-0.072781,2.536346,1.378155,-0.338321,0.462388,0.239599,0.098698,
0.363787,0.090794,-0.551600,-0.617801,-0.991390,-0.311169,1.468177,-0.470401,
0.207971,0.025791,0.403993,0.251412,-0.018307,0.277838,-0.110474,0.066928,
0.128539,-0.189115,0.133558,-0.021053,149.62];
fill(values);
}
function loadFraud(){
let values=[-2.312227,1.951992,-1.609851,3.997906,-0.522188,-1.426545,-2.537387,1.391657,
-2.770089,-2.772272,3.202033,-2.899907,-0.595222,-4.289254,0.389724,-1.140747,
-2.830056,-0.016822,0.416956,0.126911,0.517232,-0.035049,-0.465211,0.320198,
0.044519,0.177840,0.261145,-0.143276,0.00];
fill(values);
}
function fill(values){
let inputs=document.querySelectorAll("input[type=text]");
for(let i=0;i<inputs.length;i++){inputs[i].value=values[i];}
}
</script>

</body>
</html>
